name: TFDA PR Lint

# Two paths:
# - Human-authored PRs: enforce full TFDA / IEC 62304 / ISO 14971 change-control
#   fields per .github/pull_request_template.md.
# - Dependabot PRs (SOUP per IEC 62304 §8.1): auto-classify, post a generated
#   change-control record as a PR comment, auto-pass patch/minor bumps; major
#   bumps or bumps to safety-critical packages require a `human-reviewed` label
#   before the check turns green.
#
# In both cases the underlying CI workflow (ci.yml) still gates merge — this
# workflow only handles the regulatory change-control documentation.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  human-pr:
    # Use pull_request.user.login (PR author) instead of github.actor, so that
    # human-triggered events on Dependabot PRs (e.g. adding `human-reviewed`)
    # still route to the dependabot-soup job.
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR description meets TFDA change-control requirements
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const errors = [];

            // Extract free-text section by bold heading. Captures everything up to
            // the next bold heading (**...**) or the next "## " section, then
            // strips HTML comments and trims.
            function extractSection(heading) {
              const escaped = heading.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const re = new RegExp(
                `\\*\\*${escaped}[：:]\\*\\*([\\s\\S]*?)(?=\\n\\s*\\*\\*|\\n##\\s|$)`,
                'i'
              );
              const m = body.match(re);
              if (!m) return '';
              return m[1].replace(/<!--[\s\S]*?-->/g, '').trim();
            }

            // Check if any of the listed checkbox labels are marked [x] / [X].
            function anyChecked(labels) {
              return labels.some(label => {
                const escaped = label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const re = new RegExp(`-\\s*\\[[xX]\\]\\s*${escaped}`);
                return re.test(body);
              });
            }

            // 1. Intended Use — exactly one of 「是」/「否」 must be checked
            if (!anyChecked(['**是**', '**否**'])) {
              errors.push('Intended Use 影響評估：必須勾選「是」或「否」');
            }

            // 2. Intended Use explanation must not be empty
            const intendedDesc = extractSection('說明');
            if (!intendedDesc) {
              errors.push('Intended Use 影響評估「說明」不可為空');
            }

            // 3. Calculator IDs — must have at least one non-empty line
            const calcSection = extractSection('受影響的 Calculator IDs');
            const calcLines = calcSection.split('\n')
              .map(l => l.replace(/^[-*\s]+/, '').trim())
              .filter(l => l.length > 0);
            if (calcLines.length === 0) {
              errors.push('「受影響的 Calculator IDs」不可為空 — 列出 ID 或填「N/A — 原因」');
            }

            // 4. V&V evidence must not be empty
            const vvEvidence = extractSection('新增/修改的測試（V&V 證據）');
            if (!vvEvidence) {
              errors.push('「新增/修改的測試（V&V 證據）」不可為空');
            }

            // 5. IEC 62304 — exactly one class must be checked
            if (!anyChecked(['Class A', 'Class B', 'Class C'])) {
              errors.push('IEC 62304 安全性等級：必須勾選 Class A / B / C 其中一級');
            }

            // 6. TFDA classification — exactly one must be checked
            if (!anyChecked(['第一級', '第二級', '第三級'])) {
              errors.push('TFDA 醫療器材分級：必須勾選第一/二/三級');
            }

            // 7. Risk impact must not be empty
            const riskImpact = extractSection('風險影響');
            if (!riskImpact) {
              errors.push('「風險影響」不可為空（無風險請寫「無新增風險 — 原因」）');
            }

            // 8. Risk control must not be empty
            const riskCtrl = extractSection('風險控制');
            if (!riskCtrl) {
              errors.push('「風險控制」不可為空（若上題為「無新增風險」可填 N/A）');
            }

            if (errors.length > 0) {
              const heading = '## TFDA PR Lint 失敗\n\n下列 change-control 欄位未通過檢查：\n';
              const list = errors.map((e, i) => `${i + 1}. ${e}`).join('\n');
              const tail = '\n\n請依 `.github/pull_request_template.md` 填寫，並重新推送以觸發檢查。';
              core.setFailed(heading + list + tail);
            } else {
              core.info('TFDA PR Lint 全部欄位通過');
            }

  dependabot-soup:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-classify SOUP and post change-control record
        uses: actions/github-script@v7
        env:
          DEP_NAMES: ${{ steps.meta.outputs.dependency-names }}
          UPDATE_TYPE: ${{ steps.meta.outputs.update-type }}
          ECOSYSTEM: ${{ steps.meta.outputs.package-ecosystem }}
          DEP_TYPE: ${{ steps.meta.outputs.dependency-type }}
        with:
          script: |
            const MARKER = '<!-- tfda-soup-record:v1 -->';
            const depNames = process.env.DEP_NAMES || '';
            const updateType = process.env.UPDATE_TYPE || '';
            const ecosystem = process.env.ECOSYSTEM || '';
            const depType = process.env.DEP_TYPE || '';

            // Safety-critical packages: any bump here forces human review,
            // regardless of semver level. Extend conservatively — adding a
            // package here permanently gates its updates behind a reviewer.
            const SAFETY_CRITICAL = [
              'fhirclient',
              '@sentry/browser',
              '@sentry/tracing'
            ];

            const isMajor = updateType === 'version-update:semver-major';
            const depList = depNames.split(',').map(n => n.trim()).filter(Boolean);
            const touchesCritical = depList.some(d => SAFETY_CRITICAL.includes(d));
            const requiresHumanReview = isMajor || touchesCritical;

            const labels = (context.payload.pull_request.labels || []).map(l => l.name);
            const humanApproved = labels.includes('human-reviewed');

            const summary = requiresHumanReview
              ? (isMajor
                  ? '**Major bump** — 可能含 breaking change'
                  : '**Safety-critical 套件** — 影響核心元件')
              : 'Patch/minor SOUP — 自動核可路徑';

            const riskAssessment = isMajor
              ? '新增風險：Major 版本可能含 breaking change（API/行為/相容性）。控制措施：reviewer 必須檢視套件 changelog、確認 V&V 測試覆蓋率，approve 後加 `human-reviewed` 標籤。'
              : touchesCritical
                ? '新增風險：Safety-critical 套件變更。控制措施：reviewer 必須檢視變更對 FHIR/監控行為的影響，approve 後加 `human-reviewed` 標籤。'
                : '新增風險：Patch/minor 版本理論上向後相容；殘餘風險為 transitive deps 變動。控制措施：CI workflow（單元測試 + tsc + lint + build）必須全綠。';

            const statusLine = requiresHumanReview
              ? (humanApproved
                  ? '> ✅ 已加 `human-reviewed` 標籤 — 人工核可通過'
                  : '> ⚠️ **此 PR 需 reviewer 加 `human-reviewed` 標籤後才能 merge**')
              : '> ✅ 自動核可 — CI 通過即可 merge';

            const body = [
              MARKER,
              '## 🤖 自動產生的 SOUP 變更管控記錄 (IEC 62304 §8.1)',
              '',
              `**套件**: \`${depNames || '(unknown)'}\``,
              `**版本變更類型**: \`${updateType || '(unknown)'}\``,
              `**生態系**: \`${ecosystem || '(unknown)'}\``,
              `**依賴類型**: \`${depType || '(unknown)'}\``,
              `**分類**: ${summary}`,
              '',
              '---',
              '',
              '### Intended Use 影響評估',
              '**否** — SOUP 套件更新，不直接修改預期用途或臨床判讀邏輯。',
              '',
              '### IEC 62304 / TFDA 分級',
              '繼承專案現行分級（IEC 62304 Class C 套用最嚴格至所有 SOUP；TFDA 第二級）。',
              '',
              '### V&V 測試證據',
              '`ci.yml` workflow 必須通過：單元測試 + tsc 型別檢查 + ESLint + production build。',
              '',
              '### 風險評估',
              riskAssessment,
              '',
              '### Change Control 紀錄',
              `- PR: #${context.issue.number}`,
              `- Author: @dependabot[bot]`,
              `- Auto-classified: \`${requiresHumanReview ? 'requires-human-review' : 'auto-approved'}\``,
              `- Last updated: ${new Date().toISOString()}`,
              '',
              statusLine
            ].join('\n');

            // Idempotent comment: find existing by MARKER and update, else create
            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100
              });
              const existing = comments.find(c => c.body && c.body.startsWith(MARKER));
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body: body
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: body
                });
              }
            } catch (e) {
              core.warning(`Failed to post change-control comment: ${e.message}`);
            }

            // Apply auto-labels (idempotent)
            const wantLabels = ['soup-update'];
            if (isMajor) wantLabels.push('soup-major');
            if (touchesCritical) wantLabels.push('soup-safety-critical');
            const newLabels = wantLabels.filter(l => !labels.includes(l));
            if (newLabels.length > 0) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: newLabels
                });
              } catch (e) {
                core.warning(`Failed to add labels: ${e.message}`);
              }
            }

            // Pass/fail
            if (!requiresHumanReview) {
              core.info('Patch/minor SOUP — 自動核可（CI 全綠即可 merge）');
              return;
            }
            if (humanApproved) {
              core.info('高風險 SOUP 已人工審查通過');
              return;
            }
            core.setFailed(
              isMajor
                ? 'Major 版本升級需 reviewer 加 `human-reviewed` 標籤'
                : 'Safety-critical 套件變更需 reviewer 加 `human-reviewed` 標籤'
            );
