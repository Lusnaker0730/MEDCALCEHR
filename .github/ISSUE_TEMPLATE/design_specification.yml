name: "[設計] 軟體設計"
description: "新增或修改軟體設計規格 (IEC 62304)"
title: "[設計] "
labels: ["IEC62304:設計"]
body:
  - type: markdown
    attributes:
      value: |
        ## 軟體設計規格
        請填寫以下欄位，此 Issue 將自動納入軟體設計規格書 (SDS) 生成流程。
  - type: textarea
    id: design_description
    attributes:
      label: 設計方案
      description: 詳細描述設計方案，包含技術選型與實作方式
    validations:
      required: true
  - type: textarea
    id: architecture_impact
    attributes:
      label: 架構影響
      description: 此設計對現有架構的影響範圍
      placeholder: |
        影響的模組：
        影響的介面：
        相依性變更：
    validations:
      required: true
  - type: input
    id: related_requirements
    attributes:
      label: 關聯需求
      description: 此設計對應的需求 Issue 編號
      placeholder: "#12, #15"
    validations:
      required: true
  - type: textarea
    id: safety_considerations
    attributes:
      label: 安全考量
      description: 安全性、隱私保護、資料完整性等方面的考量
    validations:
      required: true
  - type: textarea
    id: test_strategy
    attributes:
      label: 測試策略
      description: 建議的測試方式與驗證方法
