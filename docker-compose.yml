version: '3.8'

services:
    medcalcehr:
        build:
            context: .
            dockerfile: Dockerfile
        image: medcalcehr:latest
        container_name: medcalcehr-app
        ports:
            - '8080:8080'
        restart: unless-stopped
        logging:
            driver: json-file
            options:
                max-size: '10m'
                max-file: '5'
        security_opt:
            - 'no-new-privileges:true'
        cap_drop:
            - ALL
        tmpfs:
            - /var/cache/nginx:uid=101,gid=101
            - /var/run:uid=101,gid=101
            - /tmp:uid=101,gid=101
        deploy:
            resources:
                limits:
                    memory: 512M
                    cpus: '1.0'
        volumes:
            - nginx-logs:/var/log/nginx
        environment:
            - TZ=Asia/Taipei
            - FHIR_CLIENT_ID=${FHIR_CLIENT_ID:-e1b41914-e2b5-4475-90ba-29022b57f820}
            - FHIR_CLIENT_SECRET=${FHIR_CLIENT_SECRET:-}
            - FHIR_SCOPE=${FHIR_SCOPE:-openid fhirUser launch profile user/Patient.rs user/Observation.rs user/Condition.rs user/MedicationRequest.rs online_access}
            - FHIR_REDIRECT_URI=${FHIR_REDIRECT_URI:-./index.html}
            - SESSION_TIMEOUT_MINUTES=${SESSION_TIMEOUT_MINUTES:-15}
            - SESSION_WARNING_MINUTES=${SESSION_WARNING_MINUTES:-2}
            - SENTRY_DSN=${SENTRY_DSN:-}
            - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
            - LOG_REMOTE_ENDPOINT=${LOG_REMOTE_ENDPOINT:-/api/client-logs}
            - LOG_REMOTE_MIN_LEVEL=${LOG_REMOTE_MIN_LEVEL:-ERROR}
        healthcheck:
            test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://127.0.0.1:8080/']
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
        networks:
            - medcalc-network
        labels:
            - 'com.medcalcehr.description=Medical Calculator EHR Integration System'
            - 'com.medcalcehr.version=1.0.0'

volumes:
    nginx-logs:

networks:
    medcalc-network:
        driver: bridge
