# Rate limiting configuration
# Loaded as /etc/nginx/conf.d/00-rate-limit.conf (before server block)

# Whitelist localhost (Docker healthcheck) from rate limiting
geo $rate_limit_key {
    default         $binary_remote_addr;
    127.0.0.1/32    "";
    ::1/128         "";
}

# General page requests: 10 requests/second per IP
limit_req_zone $rate_limit_key zone=general:10m rate=10r/s;

# API endpoints: 2 requests/second per IP
limit_req_zone $rate_limit_key zone=api:5m rate=2r/s;

# OAuth launch flow: 5 requests/second per IP
limit_req_zone $rate_limit_key zone=launch:5m rate=5r/s;
