version: '3.8'

services:
    medcalcehr:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                BUILD_VERSION: staging-${BUILD_VERSION:-latest}
                BUILD_TIME: ${BUILD_TIME:-unknown}
        image: medcalcehr:staging
        container_name: medcalcehr-staging
        ports:
            - '8081:8080'
        restart: unless-stopped
        logging:
            driver: json-file
            options:
                max-size: '5m'
                max-file: '3'
        security_opt:
            - 'no-new-privileges:true'
        cap_drop:
            - ALL
        tmpfs:
            - /var/cache/nginx:uid=101,gid=101
            - /var/run:uid=101,gid=101
            - /tmp:uid=101,gid=101
        deploy:
            resources:
                limits:
                    memory: 512M
                    cpus: '1.0'
        env_file:
            - .env.staging
        volumes:
            - nginx-logs:/var/log/nginx
        environment:
            - TZ=Asia/Taipei
            - SENTRY_ENVIRONMENT=staging
            - LOG_REMOTE_ENDPOINT=${LOG_REMOTE_ENDPOINT:-/api/client-logs}
            - LOG_REMOTE_MIN_LEVEL=${LOG_REMOTE_MIN_LEVEL:-WARN}
        healthcheck:
            test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:8080/']
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
        networks:
            - medcalc-staging-network

volumes:
    nginx-logs:

networks:
    medcalc-staging-network:
        driver: bridge
